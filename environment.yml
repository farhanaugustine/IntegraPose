# Conda environment for IntegraPose.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate integrapose
#   pip install .                       # core
#   pip install ".[plugins]"            # optional plugin stack
#   python tools/install_albumentations_gui.py   # optional augmentation
#
# Notes:
#   * Pinning to Python 3.11; tested range is 3.9–3.11.
#   * PyTorch is intentionally NOT pinned here. Install the build that
#     matches your hardware (CPU / CUDA / ROCm) by following:
#       https://pytorch.org/get-started/locally/
#     before running `pip install .`.

name: integrapose
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
