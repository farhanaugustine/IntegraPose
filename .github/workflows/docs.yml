# Builds the MkDocs site and deploys it to GitHub Pages.
#
# Triggers on:
#   * pushes to `main` that change docs, mkdocs config, or this workflow
#   * manual run from the Actions tab (workflow_dispatch)
#
# How to enable on a fresh repo:
#   1. Push this file (and your docs/ + mkdocs.yml) to the `main` branch.
#   2. On github.com:  Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".
#   3. Watch the first run on the Actions tab. The deploy job prints the live URL.
#
# Live URL pattern:  https://<owner>.github.io/<repo>/
# Expected for this repo:  https://farhanaugustine.github.io/IntegraPose/

name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Required for the deploy-pages action to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time. New pushes don't cancel an in-flight deploy
# (cancel-in-progress: false) so the live site is never left in a partial state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Build MkDocs site
        # --strict turns warnings (broken intra-doc links, missing nav pages, etc.)
        # into errors so a regression in the docs fails the build instead of
        # silently shipping a broken page.
        run: mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
